    - generic [ref=e297]:
      - heading "Methodology & Data Sources" [level=3] [ref=e298]
      - generic [ref=e299]:
        - paragraph [ref=e300]:
          - strong [ref=e301]: "Remittance data:"
          - text: Banco de Mexico (Banxico) SIE — Table CE100 (state-level, quarterly, 2003-2025). Values in USD.
        - paragraph [ref=e302]:
          - strong [ref=e303]: "US origin data:"
          - text: Banxico bilateral remittance records, quarterly, 53 US states/territories, 2013-2025.
        - paragraph [ref=e304]:
          - strong [ref=e305]: "Competitor pricing:"
          - text: Collected March 2026 from provider websites and World Bank Remittance Prices Worldwide. Dynamic pricing means these are directionally accurate, not exact.
        - paragraph [ref=e306]:
          - strong [ref=e307]: "Opportunity score:"
          - text: Composite of volume (30%), 3-year CAGR (25%), growth acceleration (25%), and underserved index (20%). All factors min-max normalized to 0-1 before weighting.
        - paragraph [ref=e308]:
          - strong [ref=e309]: "Known limitation:"
          - text: The “underserved index” uses inverse volume rank as a proxy for competitive intensity — assuming that higher-volume states attract more fintech entrants. This is directionally correct (Nu, Mercado Pago, and Stori all prioritize top-volume states), but real fintech penetration data by state from CNBV would make this factor significantly more precise. With Revolut internal data, this model becomes materially more actionable.
